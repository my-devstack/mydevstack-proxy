name: CI/CD

on:
  pull_request:
  push:
    tags: ['*']
  release:
    types: [created]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.3.0

      - name: Run golangci-lint
        run: golangci-lint run
  # Run unit tests on every PR
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # Build binaries for release (only on tags/releases)
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    needs: test
    strategy:
      matrix:
        include:
          - GOOS: linux
            GOARCH: amd64
            ARTIFACT_NAME: mydevstack-proxy-linux-amd64
          - GOOS: linux
            GOARCH: arm64
            ARTIFACT_NAME: mydevstack-proxy-linux-arm64
          - GOOS: darwin
            GOARCH: amd64
            ARTIFACT_NAME: mydevstack-proxy-darwin-amd64
          - GOOS: darwin
            GOARCH: arm64
            ARTIFACT_NAME: mydevstack-proxy-darwin-arm64
          - GOOS: windows
            GOARCH: amd64
            ARTIFACT_NAME: mydevstack-proxy-windows-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Get tag info
        id: tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
          CGO_ENABLED: 0
        run: |
          OUTPUT_NAME="${{ matrix.ARTIFACT_NAME }}"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT_NAME="${OUTPUT_NAME}.exe"
          fi
          go build -ldflags="-s -w -X main.Version=${{ steps.tag.outputs.VERSION }} -X main.BuildDate=${{ steps.tag.outputs.DATE }}" -o "../dist/${OUTPUT_NAME}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.ARTIFACT_NAME }}
          path: dist/${{ matrix.ARTIFACT_NAME }}*
          retention-days: 30

  # Create release with all binaries
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    needs: build-release
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          cd artifacts
          for dir in */; do
            mv "$dir"*/* . 2>/dev/null || true
          done
          rm -rf */
          ls -la

      - name: Create checksum file
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*
            artifacts/checksums.txt
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}