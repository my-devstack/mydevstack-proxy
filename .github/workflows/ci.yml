name: CI/CD

on:
  pull_request:
  push:
    tags: ['*']

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.3.0

      - name: Run golangci-lint
        run: golangci-lint run
  # Run unit tests on every PR
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # Build binaries for release (only on tags/releases)
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && startsWith(github.ref_name, 'v') && github.event_name != 'release'
    needs: test
    strategy:
      matrix:
        include:
          - GOOS: linux
            GOARCH: amd64
            ARTIFACT_NAME: mydevstack-proxy-linux-amd64
          - GOOS: linux
            GOARCH: arm64
            ARTIFACT_NAME: mydevstack-proxy-linux-arm64
          - GOOS: darwin
            GOARCH: amd64
            ARTIFACT_NAME: mydevstack-proxy-darwin-amd64
          - GOOS: darwin
            GOARCH: arm64
            ARTIFACT_NAME: mydevstack-proxy-darwin-arm64
          - GOOS: windows
            GOARCH: amd64
            ARTIFACT_NAME: mydevstack-proxy-windows-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Get tag info
        id: tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "DATE=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="mydevstack-proxy"
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          mkdir -p "dist/${GOOS}/${GOARCH}"
          go build -ldflags="-s -w -X main.Version=${{ steps.tag.outputs.VERSION }} -X main.BuildDate=${{ steps.tag.outputs.DATE }}" -o "dist/${GOOS}/${GOARCH}/${BINARY_NAME}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.GOOS }}-${{ matrix.GOARCH }}
          path: dist/${{ matrix.GOOS }}/${{ matrix.GOARCH }}
          retention-days: 30

  # Create release with all binaries
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && startsWith(github.ref_name, 'v') && github.event_name != 'release'
    needs: build-release
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create zipped release assets
        run: |
          cd artifacts
          rm -f *.zip checksums.txt
          shopt -s nullglob
          for d in */; do
            [ -d "$d" ] || continue
            artifact_name="${d%/}"
            files=("$d"*)
            if [ ${#files[@]} -eq 0 ]; then
              echo "No file found in $d"
              continue
            fi
            zip -j "${artifact_name}.zip" "${files[@]}"
          done
          ls -la *.zip

      - name: Create checksum file
        run: |
          cd artifacts
          find . -maxdepth 1 -name '*.zip' | sort | xargs sha256sum > checksums.txt
          cat checksums.txt

      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/*.zip
            artifacts/checksums.txt
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
